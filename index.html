<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planner 2026 · Contexto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&family=Instrument+Serif:ital@0;1&family=Syne:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f2f1ee;
      --paper: #ffffff;
      --ink: #1a1a1a;
      --muted: #6b6b6b;
      --line: #e0ddd6;
      --accent: #2563eb;
      --v: #2563eb;
      --j: #dc2626;
      --c: #16a34a;
      --ok: #16a34a;
      --warn: #d97706;
      --err: #dc2626;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'DM Sans', system-ui, sans-serif; }
    body { min-height: 100vh; }

    /* === Login overlay === */
    .auth-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .auth-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 36px 32px;
      max-width: 420px; width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.04);
    }
    .auth-card h1 {
      font-family: 'Instrument Serif', serif;
      font-weight: 400; font-size: 36px; margin: 0 0 8px;
    }
    .auth-card p { color: var(--muted); font-size: 14px; margin: 0 0 24px; }
    .auth-input {
      width: 100%; padding: 12px 14px;
      border: 1px solid var(--line); border-radius: 8px;
      font-family: 'DM Mono', monospace; font-size: 14px;
      background: var(--bg);
    }
    .auth-input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    .auth-btn {
      width: 100%; margin-top: 12px; padding: 12px;
      background: var(--ink); color: white; border: 0; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 14px;
      cursor: pointer;
    }
    .auth-btn:hover { background: #000; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-msg { margin-top: 16px; font-size: 13px; }
    .auth-msg.ok { color: var(--ok); }
    .auth-msg.err { color: var(--err); }

    /* === App shell === */
    .app { display: none; }
    .app.ready { display: block; }
    .topbar {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 24px; border-bottom: 1px solid var(--line);
      background: var(--paper);
    }
    .brand {
      font-family: 'Instrument Serif', serif; font-size: 22px;
      font-weight: 400; letter-spacing: -0.01em;
    }
    .brand small { font-family: 'DM Mono', monospace; color: var(--muted); font-size: 11px; margin-left: 6px; }
    .tabs { display: flex; gap: 4px; margin-left: auto; }
    .tab {
      padding: 8px 16px; border: 1px solid var(--line);
      background: transparent; cursor: pointer; border-radius: 6px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--muted);
    }
    .tab.active { background: var(--ink); color: white; border-color: var(--ink); }
    .me {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border: 1px solid var(--line); border-radius: 999px;
      font-size: 12px; font-family: 'DM Mono', monospace;
    }
    .me-dot {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 11px;
    }
    .signout {
      background: transparent; border: 0; color: var(--muted);
      cursor: pointer; font-family: 'DM Mono', monospace; font-size: 11px;
    }
    .signout:hover { color: var(--err); }

    /* === Sync indicator === */
    .sync-indicator {
      position: fixed; bottom: 16px; right: 16px;
      padding: 6px 12px; border-radius: 999px;
      font-family: 'DM Mono', monospace; font-size: 11px;
      background: var(--paper); border: 1px solid var(--line);
      color: var(--muted);
      transition: opacity 0.3s;
    }
    .sync-indicator.saving { color: var(--warn); }
    .sync-indicator.saved { color: var(--ok); }
    .sync-indicator.error { color: var(--err); }

    /* === Tab panels === */
    .panel { display: none; padding: 24px; }
    .panel.active { display: block; }
    .placeholder {
      max-width: 640px; margin: 60px auto;
      background: var(--paper); border: 1px dashed var(--line);
      border-radius: 12px; padding: 32px; text-align: center;
    }
    .placeholder h2 {
      font-family: 'Instrument Serif', serif; font-weight: 400;
      font-size: 28px; margin: 0 0 8px;
    }
    .placeholder p { color: var(--muted); margin: 8px 0; }
    .placeholder code {
      background: var(--bg); padding: 2px 6px; border-radius: 4px;
      font-family: 'DM Mono', monospace; font-size: 12px;
    }

    /* === Equipo chips === */
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 999px;
      font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
      color: white;
    }
    .chip.v { background: var(--v); }
    .chip.j { background: var(--j); }
    .chip.c { background: var(--c); }

    /* =================================================================
       ESTRATEGIA TAB (ex agenda-2026.html, scoped con .est-)
       ================================================================= */
    @keyframes estSlideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .est { padding: 24px 32px 48px; max-width: 760px; margin: 0 auto; transition: max-width .4s ease; }
    .est.onepager { max-width: 1000px; }
    .est-header { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid #DDD; display: flex; justify-content: space-between; align-items: flex-start; }
    .est-header-title { font-family: 'Instrument Serif', Georgia, serif; font-size: 38px; font-weight: 400; color: #1a1a1a; line-height: 1.1; letter-spacing: -.02em; }
    .est-header-sub { font-size: 14px; color: #777; margin-top: 4px; }
    .est-subtabs { display: flex; gap: 3px; background: #E8E7E3; border-radius: 8px; padding: 3px; }
    .est-subtab { font-family: 'DM Mono', monospace; font-size: 11px; padding: 7px 18px; border-radius: 6px; border: none; cursor: pointer; letter-spacing: .02em; transition: all .2s; background: transparent; color: #999; font-weight: 400; }
    .est-subtab.active { background: #FAFAF8; color: #333; box-shadow: 0 1px 3px rgba(0,0,0,.08); font-weight: 500; }

    .est-btn { font-family: 'DM Mono', monospace; font-size: 11px; color: #999; background: none; border: 1px solid #DDD; border-radius: 20px; padding: 6px 16px; cursor: pointer; letter-spacing: .03em; transition: all .2s; }
    .est-btn:hover { color: #555; border-color: #BBB; }

    .est-card { background: #FAFAF8; border-radius: 2px 14px 14px 2px; overflow: hidden; transition: all .35s cubic-bezier(.25,.46,.45,.94); }
    .est-card.exp { box-shadow: 0 8px 32px rgba(0,0,0,.08); transform: scale(1.003); }
    .est-card:not(.exp) { box-shadow: 0 2px 8px rgba(0,0,0,.03); }
    .est-hdr { padding: 22px 24px; cursor: pointer; display: flex; align-items: flex-start; gap: 16px; }
    .est-num { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; opacity: .9; min-width: 32px; margin-top: 4px; }
    .est-info { flex: 1; }
    .est-card-title { font-family: 'Instrument Serif', Georgia, serif; font-size: 22px; font-weight: 400; letter-spacing: -.01em; line-height: 1.2; margin-bottom: 4px; }
    .est-card-hl { font-size: 13px; color: #888; font-style: italic; line-height: 1.4; }
    .est-arrow { font-size: 18px; color: #BBB; transition: transform .3s ease; user-select: none; }
    .est-card.exp .est-arrow { transform: rotate(180deg); }
    .est-body { max-height: 0; opacity: 0; transition: all .45s cubic-bezier(.25,.46,.45,.94); overflow: hidden; }
    .est-card.exp .est-body { max-height: 2400px; opacity: 1; }
    .est-inner { padding: 4px 28px 28px 76px; }

    .est-sec-label { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .12em; font-weight: 500; margin-bottom: 12px; }
    .est-obj-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 7px; margin-bottom: 4px; }
    .est-obj-label { font-size: 14px; color: #fff; font-weight: 500; line-height: 1.4; }
    .est-success { border-radius: 10px; padding: 18px 20px; margin: 16px 0; }
    .est-success p { font-size: 13.5px; color: #666; line-height: 1.65; margin: 0; }

    .est-coll-sec { border-top: 1px dashed #E0DFDC; padding-top: 12px; margin-top: 8px; }
    .est-coll-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 6px 0; }
    .est-coll-arrow { font-size: 14px; color: #BBB; transition: transform .3s ease; user-select: none; display: inline-block; }
    .est-coll-arrow.open { transform: rotate(90deg); }
    .est-coll-label { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .12em; font-weight: 500; }
    .est-coll-body { transition: all .35s cubic-bezier(.25,.46,.45,.94); overflow: hidden; }
    .est-coll-badge { font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }

    .est-q-cards { display: flex; gap: 10px; padding-top: 12px; }
    .est-q-card { flex: 1; border-radius: 10px; padding: 16px 14px; display: flex; flex-direction: column; gap: 8px; }
    .est-q-hdr { display: flex; align-items: center; gap: 6px; }
    .est-q-icon { font-family: 'DM Mono', monospace; font-size: 12px; opacity: .7; }
    .est-q-label { font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: .1em; font-weight: 500; }
    .est-hito { padding: 5px 10px; border-radius: 5px; margin-bottom: 3px; }
    .est-hito-row { display: flex; align-items: center; justify-content: space-between; }
    .est-hito-label { font-size: 11px; color: #fff; font-weight: 500; line-height: 1.4; flex: 1; }
    .est-q-tag { font-size: 8px; font-family: 'DM Mono', monospace; background: rgba(255,255,255,0.25); padding: 1px 5px; border-radius: 3px; margin-left: 6px; flex-shrink: 0; color: #fff; }
    .est-subhito { padding: 3px 10px 3px 16px; border-radius: 3px; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
    .est-sub-q { font-size: 8px; font-family: 'DM Mono', monospace; background: rgba(255,255,255,0.2); padding: 1px 5px; border-radius: 2px; color: #fff; flex-shrink: 0; }
    .est-sub-label { font-size: 10px; color: #fff; line-height: 1.4; }

    .est-slider-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .est-slider { -webkit-appearance: none; width: 80px; height: 3px; border-radius: 2px; outline: none; cursor: pointer; }
    .est-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
    .est-slider::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer; border: 0; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
    .est-slider:disabled { cursor: not-allowed; opacity: .5; }
    .est-slider-pill { font-family: 'DM Mono', monospace; font-size: 9px; color: #fff; padding: 1px 6px; border-radius: 8px; font-weight: 600; white-space: nowrap; }

    .est-inter-row { display: flex; align-items: stretch; border-radius: 6px; overflow: hidden; border: 1.5px solid transparent; margin-bottom: 4px; }
    .est-inter-area { min-width: 120px; max-width: 120px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
    .est-inter-dot { width: 6px; height: 6px; min-width: 6px; border-radius: 2px; }
    .est-inter-name { font-size: 12px; font-weight: 500; }
    .est-inter-val { flex: 1; padding: 10px 14px; display: flex; align-items: center; }

    /* One Pager */
    .est-onepager-card { background: #FAFAF8; border-radius: 2px 14px 14px 2px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.03); }
    .est-onepager-card.exp { box-shadow: 0 8px 32px rgba(0,0,0,.08); }
    .est-onepager-hdr { padding: 20px 24px; cursor: pointer; display: flex; align-items: center; gap: 14px; }
    .est-tl-strip { border-top: 1px solid; }
    .est-tl-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; }
    .est-tl-cell { padding: 10px 16px; }
    .est-tl-cell-body { padding: 4px 16px 14px; }
    .est-tl-hdr { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .est-tl-period { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; opacity: .7; }
    .est-tl-period-sub { font-family: 'DM Mono', monospace; font-size: 9px; color: #BBB; }
    .est-status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .est-mini-chip { font-size: 9.5px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
    .est-legend { display: flex; gap: 20px; margin-bottom: 20px; }
    .est-legend-item { display: flex; align-items: center; gap: 6px; }
    .est-legend-text { font-family: 'DM Mono', monospace; font-size: 10px; color: #999; letter-spacing: .03em; }

    .est-readonly { padding: 12px 16px; border-radius: 8px; background: rgba(217,119,6,0.06); color: #92400e; font-size: 12px; font-family: 'DM Mono', monospace; margin-bottom: 16px; }

    /* =================================================================
       SEMANAL TAB (ex calendario2026.html → Planning subtab)
       Scoped con .sem-
       ================================================================= */
    .sem { padding: 20px 28px 48px; max-width: 1100px; margin: 0 auto; }
    .sem-header { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; padding-bottom: 14px; border-bottom: 1px solid var(--line); margin-bottom: 20px; }
    .sem-week-nav { display: flex; align-items: center; gap: 8px; }
    .sem-week-btn { background: var(--paper); border: 1px solid var(--line); border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 14px; color: var(--muted); transition: all .15s; }
    .sem-week-btn:hover { color: var(--ink); border-color: var(--ink); }
    .sem-week-info { min-width: 160px; }
    .sem-week-label { font-family: 'Instrument Serif', serif; font-size: 22px; line-height: 1; }
    .sem-week-dates { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }
    .sem-week-active-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--ok); margin-left: 6px; vertical-align: middle; }
    .sem-week-cierre-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--warn); margin-left: 6px; vertical-align: middle; }

    .sem-persona-tabs { display: flex; gap: 3px; background: #ECEAE4; border-radius: 8px; padding: 3px; }
    .sem-persona-btn { font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; background: transparent; color: var(--muted); }
    .sem-persona-btn.active { background: var(--paper); color: var(--ink); box-shadow: 0 1px 3px rgba(0,0,0,.06); font-weight: 500; }
    .sem-persona-btn .sem-persona-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

    .sem-mode-tabs { display: flex; gap: 3px; margin-left: auto; background: #ECEAE4; border-radius: 8px; padding: 3px; }
    .sem-mode-btn { font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; background: transparent; color: var(--muted); }
    .sem-mode-btn.active { background: var(--paper); color: var(--ink); box-shadow: 0 1px 3px rgba(0,0,0,.06); font-weight: 500; }
    .sem-mode-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .sem-banner { padding: 10px 14px; border-radius: 8px; font-size: 12px; font-family: 'DM Mono', monospace; margin-bottom: 16px; }
    .sem-banner-info { background: rgba(37,99,235,0.06); color: #1d4ed8; }
    .sem-banner-warn { background: rgba(217,119,6,0.06); color: #92400e; }
    .sem-banner-muted { background: var(--paper); color: var(--muted); border: 1px dashed var(--line); }

    .sem-stats { display: flex; gap: 16px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 16px; }
    .sem-stats b { color: var(--ink); font-weight: 600; }

    .sem-empty { padding: 60px 20px; text-align: center; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; background: var(--paper); border: 1px dashed var(--line); border-radius: 12px; }
    .sem-empty .sem-empty-big { font-family: 'Instrument Serif', serif; font-size: 24px; color: var(--ink); margin-bottom: 8px; font-style: italic; }

    .sem-foco-card { background: var(--paper); border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
    .sem-foco-hdr { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--line); }
    .sem-foco-tag { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 8px; border-radius: 999px; color: white; font-weight: 600; letter-spacing: .04em; }
    .sem-foco-title { font-family: 'Instrument Serif', serif; font-size: 17px; }
    .sem-foco-body { padding: 6px 18px 14px; }

    .sem-obj-block { margin-top: 10px; }
    .sem-obj-label { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-family: 'DM Mono', monospace; letter-spacing: .02em; }
    .sem-obj-dot { width: 8px; height: 8px; border-radius: 50%; }

    .sem-hito-block { margin: 6px 0 8px 16px; padding-left: 12px; border-left: 2px solid var(--line); }
    .sem-hito-label { font-size: 12.5px; font-weight: 500; color: var(--ink); margin: 6px 0 4px; }
    .sem-hito-due { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-left: 6px; font-weight: 400; }

    .sem-accion-row { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-top: 1px dashed var(--line); font-size: 13px; line-height: 1.4; }
    .sem-accion-row:first-of-type { border-top: 0; }
    .sem-accion-chip { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; color: white; font-weight: 700; font-size: 10px; font-family: 'DM Mono', monospace; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
    .sem-accion-text { flex: 1; }
    .sem-accion-comment { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; font-style: italic; }
    .sem-accion-pill { font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 7px; border-radius: 999px; flex-shrink: 0; align-self: center; font-weight: 600; letter-spacing: .04em; }
    .sem-pill-hecha   { background: rgba(22,163,74,0.12);  color: var(--ok); }
    .sem-pill-mas     { background: rgba(217,119,6,0.12);  color: var(--warn); }
    .sem-pill-cancel  { background: rgba(220,38,38,0.10);  color: var(--err); }
    .sem-pill-carry   { background: rgba(37,99,235,0.10);  color: var(--accent); }
    .sem-pill-pending { background: var(--bg);             color: var(--muted); }
    /* === Edit UI (Ronda 2A) === */
    .sem-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
    .sem-btn-primary { background: var(--ink); color: var(--paper); border: none; border-radius: 8px; padding: 8px 14px; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; }
    .sem-btn-primary:hover { opacity: 0.85; }
    .sem-btn-ghost { background: var(--paper); color: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 8px 12px; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; }
    .sem-btn-ghost:hover { background: #F5F2EA; }
    .sem-btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }
    .sem-add-form { background: var(--paper); border: 1px solid var(--line); border-radius: 10px; padding: 16px; margin-bottom: 14px; }
    .sem-add-form h4 { margin: 0 0 14px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .sem-add-form label { display: block; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 5px; margin-top: 12px; }
    .sem-add-form label:first-of-type { margin-top: 0; }
    .sem-add-form input[type=text], .sem-add-form textarea, .sem-add-form select { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px; font-family: inherit; font-size: 13px; background: #fff; color: var(--ink); }
    .sem-add-form textarea { min-height: 56px; resize: vertical; font-family: inherit; }
    .sem-add-form-row { display: flex; gap: 12px; align-items: flex-start; }
    .sem-add-form-row > div { flex: 1; min-width: 0; }
    .sem-add-form-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
    .sem-owner-pick { display: flex; gap: 4px; }
    .sem-owner-btn { flex: 1; padding: 8px 4px; border: 1px solid var(--line); border-radius: 6px; background: #fff; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; color: var(--ink); }
    .sem-owner-btn:hover { background: #F5F2EA; }
    .sem-owner-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .sem-row-actions { display: inline-flex; gap: 2px; margin-left: 6px; opacity: 0; transition: opacity 0.12s; }
    .sem-accion-row:hover .sem-row-actions { opacity: 1; }

<body>

  <!-- =================================================================
       LOGIN OVERLAY (visible hasta que auth resuelva)
       ================================================================= -->
  <div id="authOverlay" class="auth-overlay">
    <div class="auth-card">
      <h1>Planner 2026</h1>
      <p>Entra con tu email de Explora. Te llegará un link mágico para acceder.</p>
      <input id="authEmail" class="auth-input" type="email" placeholder="tucorreo@explora.com" autocomplete="email">
      <button id="authBtn" class="auth-btn">Enviar link mágico</button>
      <div id="authMsg" class="auth-msg"></div>
    </div>
  </div>

  <!-- =================================================================
       APP SHELL (oculta hasta auth + hydrate)
       ================================================================= -->
  <div id="app" class="app">
    <header class="topbar">
      <div class="brand">Planner 2026 <small id="version">v2026-05-13.8 dev</small></div>
      <nav class="tabs">
        <button class="tab active" data-tab="estrategia">Estrategia</button>
        <button class="tab" data-tab="semanal">Semanal</button>
        <button class="tab" data-tab="ceo" title="Notas privadas — solo las ves vos">🤐 CEO</button>
      </nav>
      <div class="me">
        <div id="meDot" class="me-dot">·</div>
        <span id="meName">—</span>
        <button id="signoutBtn" class="signout" title="Cerrar sesión">salir</button>
      </div>
    </header>

    <!-- Tab: Estrategia (ex-agenda-2026.html) -->
    <section id="panel-estrategia" class="panel active">
      <div id="estrategia-root" class="est"></div>
    </section>

    <!-- Tab: Semanal (ex-calendario2026.html) -->
    <section id="panel-semanal" class="panel">
      <div id="semanal-root" class="sem"></div>
    </section>

    <!-- Tab: CEO Update (notas privadas por hito) -->
    <section id="panel-ceo" class="panel">
      <div id="ceo-root" class="ceo"></div>
    </section>
  </div>

  <!-- Sync indicator (esquina inferior derecha) -->
  <div id="syncIndicator" class="sync-indicator">listo</div>

  <!-- =================================================================
       SUPABASE CLIENT + LÓGICA DE AUTH / HYDRATE / SAVE
       ================================================================= -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
  (function () {
    'use strict';

    // ----- Config -------------------------------------------------------
    var SUPABASE_URL = 'https://abcurifmwsytheispmml.supabase.co';
    var SUPABASE_KEY = 'sb_publishable__bi7QePH2o46RR6V4e_NCQ_n82HrDFJ';
    var DEBOUNCE_MS = 800;

    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    // ----- State holders ------------------------------------------------
    window.appState = {
      shared: {},          // estado compartido (focos, agenda, etc.)
      users:  {},          // mapa user_id -> {state, email, name, initial, color}
      me:     null,        // {user_id, email, name, initial, color, can_edit_shared}
      ready:  false
    };

    var saveTimers = { shared: null, user: null };
    var syncEl = document.getElementById('syncIndicator');

    function setSync(state, msg) {
      syncEl.className = 'sync-indicator ' + state;
      syncEl.textContent = msg || state;
    }

    // ----- Auth flow ---------------------------------------------------
    var authOverlay = document.getElementById('authOverlay');
    var authEmail   = document.getElementById('authEmail');
    var authBtn     = document.getElementById('authBtn');
    var authMsg     = document.getElementById('authMsg');

    authBtn.addEventListener('click', sendMagicLink);
    authEmail.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') sendMagicLink();
    });

    async function sendMagicLink() {
      var email = (authEmail.value || '').trim().toLowerCase();
      if (!email) { showAuthMsg('Escribe tu email.', 'err'); return; }
      authBtn.disabled = true;
      showAuthMsg('Enviando...', '');
      try {
        var redirect = window.location.origin + window.location.pathname;
        var resp = await sb.auth.signInWithOtp({
          email: email,
          options: { emailRedirectTo: redirect }
        });
        if (resp.error) throw resp.error;
        showAuthMsg('Listo. Revisa tu correo y abre el link.', 'ok');
      } catch (err) {
        console.error(err);
        showAuthMsg('Error: ' + (err.message || err), 'err');
      } finally {
        authBtn.disabled = false;
      }
    }

    function showAuthMsg(msg, cls) {
      authMsg.textContent = msg;
      authMsg.className = 'auth-msg ' + (cls || '');
    }

    // Guardia contra doble-hidratación. onAuthStateChange puede dispararse
    // varias veces (INITIAL_SESSION, SIGNED_IN, TOKEN_REFRESHED) y queremos
    // ejecutar el flujo de hydrate solo una vez por sesión.
    var _hydrating = false;
    var _hydratedUserId = null;

    // Único listener de auth — fires INITIAL_SESSION al cargar si ya hay sesión,
    // así que no necesitamos llamar a getSession() por separado.
    sb.auth.onAuthStateChange(function (event, session) {
      if (event === 'SIGNED_OUT') {
        location.reload();
        return;
      }
      if (session && session.user && _hydratedUserId !== session.user.id) {
        onAuthenticated(session.user);
      }
    });

    async function onAuthenticated(user) {
      if (_hydrating || _hydratedUserId === user.id) return;
      _hydrating = true;
      try {
        // 1. Verificar allowlist
        var ar = await sb.from('planner_allowlist').select('*').eq('email', user.email).maybeSingle();
        if (ar.error) throw ar.error;
        if (!ar.data) {
          showAuthMsg('Tu email no está autorizado. Habla con Víctor.', 'err');
          await sb.auth.signOut();
          return;
        }

        var me = {
          user_id: user.id,
          email: user.email,
          name: ar.data.display_name,
          initial: ar.data.initial,
          color: ar.data.color || '#888',
          can_edit_shared: ar.data.can_edit_shared
        };
        window.appState.me = me;

        // 2. Hydrate shared + users en paralelo
        var [sharedR, usersR, allR] = await Promise.all([
          sb.from('planner_shared').select('state').eq('id', 1).maybeSingle(),
          sb.from('planner_user').select('user_id, state, updated_at'),
          sb.from('planner_allowlist').select('email, display_name, initial, color')
        ]);
        if (sharedR.error) throw sharedR.error;
        if (usersR.error)  throw usersR.error;

        window.appState.shared = (sharedR.data && sharedR.data.state) || {};

        // Map user_id -> profile (necesita join con auth.users para email, pero
        // como solo podemos leer allowlist, mapeamos por user_id directamente).
        // Para llegar de user_id a allowlist info, necesitamos email del auth.user.
        // En v0.1 dejamos solo state por user_id; el join completo lo hacemos
        // con un view en Supabase en la siguiente iteración.
        window.appState.users = {};
        (usersR.data || []).forEach(function (row) {
          window.appState.users[row.user_id] = { state: row.state || {} };
        });

        // 3. Asegurar mi fila en planner_user (upsert evita 409 en caso de
        //    que ya exista de una sesión previa)
        if (!window.appState.users[me.user_id]) {
          var insR = await sb.from('planner_user').upsert({
            user_id: me.user_id,
            state: { weeks: {} }
          }, { onConflict: 'user_id', ignoreDuplicates: true });
          if (insR.error) throw insR.error;
          window.appState.users[me.user_id] = { state: { weeks: {} } };
        }

        // 4. Mostrar app
        renderShell();
        window.appState.ready = true;
        authOverlay.style.display = 'none';
        document.getElementById('app').classList.add('ready');
        setSync('saved', 'cargado');

        // Hooks para extensión futura: cuando el contenido real se monte,
        // ejecutará renderEstrategia() y renderSemanal() desde aquí.
        if (typeof window.renderEstrategia === 'function') window.renderEstrategia();
        if (typeof window.renderSemanal === 'function')    window.renderSemanal();
        if (typeof window.renderCEO === 'function')        window.renderCEO();

        _hydratedUserId = user.id;

      } catch (err) {
        console.error('Hydrate error:', err);
        showAuthMsg('Error al cargar datos: ' + (err.message || err), 'err');
      } finally {
        _hydrating = false;
      }

      mutateShared: function (mutator) {

      // Lee shared.weeks[wk] (o null si no existe). NO crea.
      getSharedWeek: function (wk) {

      // Muta shared.weeks[wk] garantizando que existe con shape mínima.
      // El mutator recibe el objeto week directamente.
      mutateSharedWeek: function (wk, mutator) {

      flush: async function () {

      }

    function scheduleSave(which) {
      if (saveTimers[which]) clearTimeout(saveTimers[which]);
      setSync('saving', 'guardando…');
      saveTimers[which] = setTimeout(function () {
        if (which === 'shared') saveShared();
        else saveUser();
      }, DEBOUNCE_MS);

    async function saveShared(force) {
      if (!window.appState.me) return;
      if (!window.appState.me.can_edit_shared) return;
      try {
        var resp = await sb.from('planner_shared').update({
          state: window.appState.shared,
          updated_by: window.appState.me.user_id
        }).eq('id', 1);
        if (resp.error) throw resp.error;
        setSync('saved', 'guardado');
      } catch (err) {
        console.error('saveShared error:', err);
        setSync('error', 'error guardando');
      }
    }

    async function saveUser(force) {
      if (!window.appState.me) return;
      var me = window.appState.me;
      var slot = window.appState.users[me.user_id];
      if (!slot) return;
      try {
        var resp = await sb.from('planner_user').upsert({
          user_id: me.user_id,
          state: slot.state

        if (resp.error) throw resp.error;
        setSync('saved', 'guardado');
      } catch (err) {
        console.error('saveUser error:', err);
        setSync('error', 'error guardando');
      }
    }

    // Flush antes de cerrar
    window.addEventListener('beforeunload', function () {
      if (saveTimers.shared) saveShared(true);
      if (saveTimers.user)   saveUser(true);
    });

      });

    // ----- ISO week math ----------------------------------------------
    function getISOWeek(date) {
      var d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      var dayNum = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dayNum);
      var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      return { year: d.getUTCFullYear(), week: weekNo };
    }
    function weekToKey(year, week) {
      return year + '_W' + (week < 10 ? '0' + week : '' + week);
    }
    function parseKey(k) {
      var m = k && k.match(/^(\d{4})_W(\d+)$/);
      return m ? { year: +m[1], week: +m[2] } : null;
    }
    function weekKeyToDates(k) {
      var p = parseKey(k);
      if (!p) return '—';
      var jan4 = new Date(Date.UTC(p.year, 0, 4));
      var jan4dow = jan4.getUTCDay() || 7;
      var monday = new Date(jan4);
      monday.setUTCDate(jan4.getUTCDate() - (jan4dow - 1) + (p.week - 1) * 7);
      var sunday = new Date(monday); sunday.setUTCDate(monday.getUTCDate() + 6);
      var mes = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      return monday.getUTCDate() + ' ' + mes[monday.getUTCMonth()] + ' – ' +
             sunday.getUTCDate() + ' ' + mes[sunday.getUTCMonth()];
    }
    function weekKeyLabel(k) {
      var p = parseKey(k);
      return p ? ('W' + p.week + ' · ' + p.year) : (k || '—');
    }
    function isoWeeksInYear(year) {
      var d = new Date(year, 0, 1).getDay() || 7;
      var leap = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
      return (d === 4 || (leap && d === 3)) ? 53 : 52;
    }
    function shiftWeek(delta) {
      var p = parseKey(semSt.weekKey);
      if (!p) return;
      var newWeek = p.week + delta;
      var newYear = p.year;
      if (newWeek < 1) { newYear--; newWeek = isoWeeksInYear(newYear); }
      if (newWeek > isoWeeksInYear(newYear)) { newYear++; newWeek = 1; }
      semSt.weekKey = weekToKey(newYear, newWeek);
      render();
    }
    function pickInitialWeek() {
      var sw = (window.planner.getShared().weeks) || {};
      var weeks = Object.keys(sw).filter(function (k) { return parseKey(k); });
      if (weeks.length) {
        weeks.sort();
        return weeks[weeks.length - 1];
      }
      var iso = getISOWeek(new Date());
      return weekToKey(iso.year, iso.week);
    }

    // ----- Acciones del estado compartido (filtra por persona) --------
    function getAccionesForView() {
      var w = window.planner.getSharedWeek(semSt.weekKey);
      if (!w || !w.acciones) return [];
      var pers = semSt.persona;
      var out = [];
      w.acciones.forEach(function (a, idx) {
        if (pers !== 'all' && a.owner !== pers) return;
        var copy = {}; for (var k in a) if (a.hasOwnProperty(k)) copy[k] = a[k];
        copy._idx = idx; // posición en el array original (para edit/delete)
        out.push(copy);
      });
      return out;
    }

    function myWeekState() {
      return window.planner.getSharedWeek(semSt.weekKey);
    }
    // Cuenta de cierres marcados en la semana (cierreSaved_Víctor / _Jaime / _Colomba)
    function teamCierreCount() {
      var w = window.planner.getSharedWeek(semSt.weekKey);
      if (!w) return 0;
      var n = 0;
      ['Víctor', 'Jaime', 'Colomba'].forEach(function (name) {
        if (w['cierreSaved_' + name]) n++;
      });
      return n;
    }

    // ----- Render: Plan mode ------------------------------------------
    function renderPlanMode(editable) {
      var acciones = getAccionesForView();
      var objs = (window.planner.getShared().objs || []);

      if (!acciones.length) {
        var msg = (objs.length === 0)
          ? 'El estado compartido aún no tiene focos cargados.'
          : (editable
              ? 'No hay acciones todavía. Tocá "+ Nueva acción" arriba para arrancar, o "↻ Traer pendientes" para barrer la semana anterior.'
              : 'No hay acciones para esta vista en ' + weekKeyLabel(semSt.weekKey) + '.');
        return '<div class="sem-empty"><div class="sem-empty-big">Sin acciones</div><p>' + escapeHtml(msg) + '</p></div>';
      }

      var byHito = {};
      acciones.forEach(function (a) {
        var hid = a.hitoId || '_orphan';
        if (!byHito[hid]) byHito[hid] = [];
        byHito[hid].push(a);
      });

      var counts = { hecha: 0, mas: 0, cancel: 0, pending: 0, carried: 0 };
      acciones.forEach(function (a) {
        if (a.carried) counts.carried++;
        if (a.cierreState === 'hecha') counts.hecha++;
        else if (a.cierreState === 'mas-tiempo') counts.mas++;
        else if (a.cierreState === 'cancelada') counts.cancel++;
        else counts.pending++;
      });

      var h = '';
      h += '<div class="sem-stats">';
      h += '<span>Total <b>' + acciones.length + '</b></span>';
      h += '<span>Hechas <b>' + counts.hecha + '</b></span>';
      h += '<span>Más tiempo <b>' + counts.mas + '</b></span>';
      h += '<span>Pendientes <b>' + counts.pending + '</b></span>';
      if (counts.cancel)  h += '<span>Canceladas <b>' + counts.cancel + '</b></span>';
      if (counts.carried) h += '<span>Carry-over <b>' + counts.carried + '</b></span>';
      h += '</div>';

      var orphans = [];
      var focoIdx = 0;
      objs.forEach(function (foco) {
        focoIdx++;
        var focoTag  = focoTagLabel(foco);
        var focoCol  = focoHeaderColor(focoIdx, foco);
        var focoBody = '';

        (foco.objetivos || foco.hitos ? (foco.objetivos || [{ hitos: foco.hitos, color: '#888', text: '' }]) : []).forEach(function (ob) {
          var oc = ob.color || '#888';
          var objBlock = '';
          (ob.hitos || []).forEach(function (hi) {
            var arr = byHito[hi.id];
            if (!arr || !arr.length) return;
            objBlock += '<div class="sem-hito-block">';
            objBlock += '<div class="sem-hito-label">' + escapeHtml(hi.text || '');
            if (hi.due) objBlock += '<span class="sem-hito-due">' + escapeHtml(hi.due) + '</span>';
            objBlock += '</div>';
            arr.forEach(function (a) { objBlock += accionRowHtml(a, editable); a._rendered = true; });
            objBlock += '</div>';
          });
          if (objBlock) {
            focoBody += '<div class="sem-obj-block">';
            if (ob.text) {
              focoBody += '<div class="sem-obj-label"><span class="sem-obj-dot" style="background:' + oc + '"></span>' + escapeHtml(ob.text) + '</div>';
            }
            focoBody += objBlock;
            focoBody += '</div>';
          }
        });

        if (focoBody) {
          h += '<div class="sem-foco-card">';
          h += '<div class="sem-foco-hdr">';
          h += '<span class="sem-foco-tag" style="background:' + focoCol + '">' + escapeHtml(focoTag) + '</span>';
          h += '<span class="sem-foco-title">' + escapeHtml(focoTitleClean(foco.text)) + '</span>';
          h += '</div>';
          h += '<div class="sem-foco-body">' + focoBody + '</div>';
          h += '</div>';
        }
      });

      acciones.forEach(function (a) { if (!a._rendered) orphans.push(a); });
      if (orphans.length) {
        h += '<div class="sem-foco-card">';
        h += '<div class="sem-foco-hdr"><span class="sem-foco-tag" style="background:#888">?</span><span class="sem-foco-title">Sin foco asociado</span></div>';
        h += '<div class="sem-foco-body">';
        orphans.forEach(function (a) { h += accionRowHtml(a, editable); });
        h += '</div></div>';
      }

      return h;
    }

    // ----- Permisos / helpers de edición ------------------------------
    function canEdit() {
      var me = window.planner.getMe();
      if (!me || !me.can_edit_shared) return false;
      // Editás en tu vista personal o en Equipo (queda con dueño "yo" por default)
      return semSt.persona === me.name || semSt.persona === 'all';
    }
    function prevWeekKey(k) {
      var p = parseKey(k);
      if (!p) return null;
      var w = p.week - 1, y = p.year;
      if (w < 1) { y--; w = isoWeeksInYear(y); }
      return weekToKey(y, w);
    }
    function nextAccionId() {
      return 'a_' + Date.now().toString(36) + '_' + Math.floor(Math.random() * 9999).toString(36);
    }
    function allHitosFlat() {
      var objs = (window.planner.getShared().objs) || [];
      var out = [];
      objs.forEach(function (foco) {
        var subs = foco.objetivos || (foco.hitos ? [{ hitos: foco.hitos, text: '' }] : []);
        subs.forEach(function (ob) {
          (ob.hitos || []).forEach(function (hi) {
            out.push({
              focoId: foco.id, focoText: foco.text || '',
              objId: ob.id || '', objText: ob.text || '',
              hitoId: hi.id, hitoText: hi.text || '', hitoDue: hi.due || ''
            });
          });
        });
      });
      return out;
    }

    // ----- Mutadores -------------------------------------------------
    function addAccion(data) {
      var wk = semSt.weekKey;
      return window.planner.mutateSharedWeek(wk, function (w) {
        if (!w.acciones) w.acciones = [];
        w.acciones.push({
          id: nextAccionId(),
          text: data.text,
          owner: data.owner,
          objId: data.objId || '',
          hitoId: data.hitoId,
          done: false,
          week: wk,
          cierreState: '',
          carried: false,
          comment: ''
        });
      });
    }
    function updateAccion(idx, patch) {
      var wk = semSt.weekKey;
      return window.planner.mutateSharedWeek(wk, function (w) {
        if (!w.acciones || !w.acciones[idx]) return;
        Object.keys(patch).forEach(function (k) { w.acciones[idx][k] = patch[k]; });
      });
    }
    function deleteAccion(idx) {
      var wk = semSt.weekKey;
      return window.planner.mutateSharedWeek(wk, function (w) {
        if (!w.acciones) return;
        w.acciones.splice(idx, 1);
      });
    }
    function carryFromPrev() {
      var wk = semSt.weekKey;
      var prevK = prevWeekKey(wk);
      if (!prevK) return { added: 0, skipped: 0, prev: null };
      var prev = window.planner.getSharedWeek(prevK);
      if (!prev || !prev.acciones || !prev.acciones.length) return { added: 0, skipped: 0, prev: prevK };
      var counts = { added: 0, skipped: 0, prev: prevK };
      window.planner.mutateSharedWeek(wk, function (w) {
        if (!w.acciones) w.acciones = [];
        prev.acciones.forEach(function (a) {
          if (a.cierreState === 'hecha' || a.cierreState === 'cancelada') { counts.skipped++; return; }
          var dup = w.acciones.find(function (x) { return x.text === a.text && x.hitoId === a.hitoId; });
          if (dup) { counts.skipped++; return; }
          w.acciones.push({
            id: nextAccionId(),
            text: a.text,
            owner: a.owner || 'Víctor',
            objId: a.objId || '',
            hitoId: a.hitoId,
            done: false,
            week: wk,
            cierreState: 'mas-tiempo',
            carried: true,
            comment: ''
          });
          counts.added++;
        });
      });
      return counts;
    }

    // ----- Render row (con/sin edit controls) ------------------------
    function accionRowHtml(a, editable) {

      if (editable && semSt.editing === a._idx) {

    function focoHeaderColor(idx, foco) {
      if (foco.tag === 'personal') return '#6b7280';
      var pal = ['#1B3A4B', '#2D5F3E', '#5C3D2E', '#3B2D5C', '#5C1A1A'];
      return pal[(idx - 1) % pal.length];
    }
    function focoTagLabel(foco) {
      if (foco.tag === 'personal') return 'PERSONAL';
      var m = (foco.text || '').match(/^(\d{2}|4\+1)/);
      return m ? m[0] : 'WORK';
    }
    function focoTitleClean(t) {
      return (t || '').replace(/^(\d{2}|4\+1)\s*·\s*/, '');
    }
    function pillClassFor(c) {
      if (c === 'hecha')      return 'sem-pill-hecha';
      if (c === 'mas-tiempo') return 'sem-pill-mas';
      if (c === 'cancelada')  return 'sem-pill-cancel';
      return 'sem-pill-pending';
    }
    function pillLabelFor(c) {
      if (c === 'hecha')      return 'HECHA';
      if (c === 'mas-tiempo') return 'MÁS TIEMPO';
      if (c === 'cancelada')  return 'CANCEL.';
      return '';
    }

    // ----- Sidebar: helpers de fecha y eventos -----------------------
    function addDaysDate(d, n) {
      var x = new Date(d); x.setDate(x.getDate() + n); return x;
    }
    function fmtShortDate(d) {
      var mes = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      return d.getDate() + ' ' + mes[d.getMonth()];
    }
    function dayLabel(d) { return ['Do','Lu','Ma','Mi','Ju','Vi','Sá'][d.getDay()]; }
    // Lunes de la semana en local time (no UTC, porque EV es por fecha calendar local)
    function mondayOfWeekKey(k) {
      var p = parseKey(k);
      if (!p) return null;
      var jan4 = new Date(Date.UTC(p.year, 0, 4));
      var jan4dow = jan4.getUTCDay() || 7;
      var monUtc = new Date(jan4);
      monUtc.setUTCDate(jan4.getUTCDate() - (jan4dow - 1) + (p.week - 1) * 7);
      // Convertir a local-naive (mismo year/month/date)
      return new Date(monUtc.getUTCFullYear(), monUtc.getUTCMonth(), monUtc.getUTCDate());
    }
    // Lista de eventos en una semana (lun→vie) como [{evKey, evIdx, ev, day}]
    // Solo trae eventos de categorías de trabajo (WORK_CATS).
    function eventsInWeek(monday) {
      var out = [];
      for (var i = 0; i < 5; i++) {
        var day = addDaysDate(monday, i);
        var key = (day.getMonth() + 1) + '-' + day.getDate();
        if (EV[key]) {
          EV[key].forEach(function (ev, idx) {
            if (!WORK_CATS[ev.cat]) return; // saltar personales
            out.push({ evKey: key, evIdx: idx, ev: ev, day: day, evUniqueKey: key + '_' + idx });
          });
        }
      }
      return out;
    }

    // ----- Mutadores del sidebar -------------------------------------
    function addAdminItem(text, owner) {
      var wk = semSt.weekKey;
      return window.planner.mutateSharedWeek(wk, function (w) {
        if (!w.admin) w.admin = [];
        w.admin.push({ id: nextAccionId(), text: text, owner: owner, done: false });
      });
    }
    function deleteAdminItem(idx) {
      var wk = semSt.weekKey;
      return window.planner.mutateSharedWeek(wk, function (w) {
        if (!w.admin) return;
        w.admin.splice(idx, 1);
      });
    }
    function toggleAdminDone(idx) {
      var wk = semSt.weekKey;
      return window.planner.mutateSharedWeek(wk, function (w) {
        if (!w.admin || !w.admin[idx]) return;
        w.admin[idx].done = !w.admin[idx].done;
      });
    }
    function setNotes(text) {
      var wk = semSt.weekKey;
      return window.planner.mutateSharedWeek(wk, function (w) {
        w.notes = text;
      });
    }
    function setCalPrep(prepKey, text) {
      var wk = semSt.weekKey;
      return window.planner.mutateSharedWeek(wk, function (w) {
        if (!w.calPrep) w.calPrep = {};
        if (text) w.calPrep[prepKey] = text;
        else delete w.calPrep[prepKey];
      });
    }
    function setCalOwner(ownerKey, owner) {
      var wk = semSt.weekKey;
      return window.planner.mutateSharedWeek(wk, function (w) {
        if (!w.calPrep) w.calPrep = {};
        w.calPrep[ownerKey] = owner;
        // Si ya está sincronizado a cal[], update owner ahí también
        if (w.cal) {
          var ci = w.cal.findIndex(function (c) { return c._evKey === ownerKey.replace(/^owner_/, ''); });
          if (ci >= 0) w.cal[ci].owner = owner;
        }
      });
    }
    function syncCalItem(evUniqueKey, text, owner) {
      var wk = semSt.weekKey;
      return window.planner.mutateSharedWeek(wk, function (w) {
        if (!w.cal) w.cal = [];
        var idx = w.cal.findIndex(function (c) { return c._evKey === evUniqueKey; });
        if (text && text.trim()) {
          if (idx >= 0) {
            w.cal[idx].text = text.trim();
            w.cal[idx].owner = owner;
          } else {
            w.cal.push({ id: nextAccionId(), text: text.trim(), owner: owner, done: false, _evKey: evUniqueKey });
          }
        } else if (idx >= 0) {
          w.cal.splice(idx, 1);
        }
      });
    }

          var col = PERSONA_COLORS[owner] || '#888';
          var st = it.cierreState || '';
          h += '<div class="sem-admin-item">';
          h += '<span class="sem-admin-chip" style="background:' + col + '">' + escapeHtml(letter) + '</span>';
          h += '<span class="txt">' + escapeHtml(it.text || '') + '</span>';
          if (editable) {
            h += '<span class="sem-cierre-actions">';
            h += '<button class="sem-cierre-btn hecha' + (st === 'hecha' ? ' active' : '') + '" data-sem-action="cal-cierre-state" data-state="hecha" data-idx="' + i + '" title="Hecha">✓</button>';
            h += '<button class="sem-cierre-btn mas' + (st === 'mas-tiempo' ? ' active' : '') + '" data-sem-action="cal-cierre-state" data-state="mas-tiempo" data-idx="' + i + '" title="Más tiempo">⌛</button>';
            h += '<button class="sem-cierre-btn cancel' + (st === 'cancelada' ? ' active' : '') + '" data-sem-action="cal-cierre-state" data-state="cancelada" data-idx="' + i + '" title="Cancelada">✕</button>';
            h += '</span>';
          } else {
            if (st === 'hecha')        h += '<span class="sem-accion-pill sem-pill-hecha">HECHA</span>';
            else if (st === 'mas-tiempo') h += '<span class="sem-accion-pill sem-pill-mas">MÁS T.</span>';
            else if (st === 'cancelada')  h += '<span class="sem-accion-pill sem-pill-cancel">CANCEL.</span>';
          }
          h += '</div>';
        });
        h += '</div>';
      }
      h += '</div></div>';
      return h;
    }

    // ----- Render: bloque Calendario próximas 3 semanas --------------
    function renderCalBlock(editable) {
      var monday = mondayOfWeekKey(semSt.weekKey);
      if (!monday) return '';
      var w = myWeekState() || {};
      var calPrep = w.calPrep || {};
      var calSynced = w.cal || [];
      var labels = ['Esta semana', 'Próxima semana', 'En 2 semanas'];

      var h = '<div class="sem-side-block">';
      h += '<div class="sem-side-hdr"><span class="ico">🗓</span> Próximas semanas</div>';
      h += '<div class="sem-side-body">';
      for (var wi = 0; wi < 3; wi++) {
        var mon = addDaysDate(monday, wi * 7);
        var fri = addDaysDate(mon, 4);
        h += '<div class="sem-cal-weeklabel">' + labels[wi] + ' · ' +
             escapeHtml(fmtShortDate(mon)) + ' – ' + escapeHtml(fmtShortDate(fri)) + '</div>';
        var evs = eventsInWeek(mon);
        if (!evs.length) {
          h += '<div class="sem-cal-empty">Sin eventos esta semana</div>';
          continue;
        }
        evs.forEach(function (e) {
          var ev = e.ev;
          var col = CAT_COLORS[ev.cat] || '#8e97b0';
          var uniqKey = e.evUniqueKey;
          var prepKey = 'prep_' + uniqKey;
          var ownerKey = 'owner_' + uniqKey;
          var curPrep = calPrep[prepKey] || '';
          var curOwner = calPrep[ownerKey] || 'Víctor';
          var isSynced = calSynced.some(function (c) { return c._evKey === uniqKey; });

          h += '<div class="sem-cal-event">';
          h += '<div class="sem-cal-dot" style="background:' + col + '"></div>';
          h += '<div class="sem-cal-body">';
          h += '<div class="sem-cal-head">';
          h += '<span class="sem-cal-date">' + dayLabel(e.day) + ' ' + escapeHtml(fmtShortDate(e.day)) + '</span>';
          h += '<span class="sem-cal-text">' + escapeHtml(ev.t || '') + '</span>';
          if (editable) {
            h += '<select class="sem-cal-owner-sel" data-sem-action="set-cal-owner" data-ownerkey="' + escapeHtml(ownerKey) + '" data-evkey="' + escapeHtml(uniqKey) + '">';
            OWNERS_ALL.forEach(function (o) {
              h += '<option' + (o === curOwner ? ' selected' : '') + '>' + escapeHtml(o) + '</option>';
            });
            h += '</select>';
          } else {
            h += '<span class="sem-cal-owner-sel">' + escapeHtml(curOwner) + '</span>';
          }
          h += '</div>';
          if (editable) {
            h += '<div class="sem-cal-prep-row">';
            h += '<textarea class="sem-cal-prep" rows="1" placeholder="Tarea / qué preparar..." data-sem-action="set-cal-prep" data-prepkey="' + escapeHtml(prepKey) + '">' + escapeHtml(curPrep) + '</textarea>';
            h += '<button class="sem-cal-add-btn' + (isSynced ? ' synced' : '') + '" data-sem-action="sync-cal" data-evkey="' + escapeHtml(uniqKey) + '" data-evtext="' + escapeHtml(ev.t || '') + '" data-prepkey="' + escapeHtml(prepKey) + '" data-ownerkey="' + escapeHtml(ownerKey) + '">' + (isSynced ? '✓ En plan' : '+ Plan') + '</button>';
            h += '</div>';
          } else if (curPrep) {
            h += '<div style="font-size:11px;color:var(--muted);margin-top:3px;">↳ ' + escapeHtml(curPrep) + '</div>';
          }
          h += '</div></div>';
        });
      }
      h += '</div></div>';
      return h;
    }

    // ----- Render: bloque Notas (mode=plan o cierre) -----------------
    function renderNotasBlock(editable, mode) {
      var w = myWeekState() || {};
      var isCierre = (mode === 'cierre');
      var notes = isCierre ? (w.cierreNotes || '') : (w.notes || '');
      var hdrLabel = isCierre ? 'Notas del cierre' : 'Notas del plan';
      var placeholder = isCierre
        ? 'Reflexiones de la semana, qué funcionó, qué no, aprendizajes...'
        : 'Foco de la semana, contexto, intenciones...';
      var h = '<div class="sem-side-block">';
      h += '<div class="sem-side-hdr"><span class="ico">📝</span> ' + hdrLabel + '</div>';
      h += '<div class="sem-side-body">';
      if (editable) {
        h += '<textarea class="sem-notes-area" id="semNotesArea" data-notes-field="' + (isCierre ? 'cierreNotes' : 'notes') + '" placeholder="' + placeholder + '">' + escapeHtml(notes) + '</textarea>';
      } else {
        h += notes
          ? '<div style="font-size:13px;white-space:pre-wrap;color:var(--ink);">' + escapeHtml(notes) + '</div>'
          : '<div class="sem-cal-empty">Sin notas para esta semana.</div>';
      }
      h += '</div></div>';
      return h;
    }

    // ----- Modo Cierre: helpers + mutators ---------------------------
    function nextWeekKey(k) {
      var p = parseKey(k);
      if (!p) return null;
      var w = p.week + 1, y = p.year;
      if (w > isoWeeksInYear(y)) { y++; w = 1; }
      return weekToKey(y, w);
    }
    function setCierreState(idx, state) {
      var wk = semSt.weekKey;
      return window.planner.mutateSharedWeek(wk, function (w) {
        if (!w.acciones || !w.acciones[idx]) return;
        var cur = w.acciones[idx].cierreState || '';
        // Toggle: si ya tiene este estado, lo limpio. Si no, lo seteo.
        w.acciones[idx].cierreState = (cur === state) ? '' : state;
      });
    }
    function setAccionComment(idx, text) {
      var wk = semSt.weekKey;
      return window.planner.mutateSharedWeek(wk, function (w) {
        if (!w.acciones || !w.acciones[idx]) return;
        w.acciones[idx].comment = text;
      });
    }
    function setCierreNotes(text) {
      var wk = semSt.weekKey;
      return window.planner.mutateSharedWeek(wk, function (w) {
        w.cierreNotes = text;
      });
    }
    function setAdminCierreState(idx, state) {
      var wk = semSt.weekKey;
      return window.planner.mutateSharedWeek(wk, function (w) {
        if (!w.admin || !w.admin[idx]) return;
        var cur = w.admin[idx].cierreState || '';
        w.admin[idx].cierreState = (cur === state) ? '' : state;
        // Sincronizar done con hecha (compat con código legacy que lee .done)
        if (w.admin[idx].cierreState === 'hecha') w.admin[idx].done = true;
        else if (!w.admin[idx].cierreState) w.admin[idx].done = false;
      });
    }
    function setCalCierreState(idx, state) {
      var wk = semSt.weekKey;
      return window.planner.mutateSharedWeek(wk, function (w) {
        if (!w.cal || !w.cal[idx]) return;
        var cur = w.cal[idx].cierreState || '';
        w.cal[idx].cierreState = (cur === state) ? '' : state;
        if (w.cal[idx].cierreState === 'hecha') w.cal[idx].done = true;
        else if (!w.cal[idx].cierreState) w.cal[idx].done = false;
      });
    }
    function saveCierre() {
      var me = window.planner.getMe();
      var wk = semSt.weekKey;
      var nxt = nextWeekKey(wk);
      var counts = { carried: 0, skipped: 0, carriedAdmin: 0, skippedAdmin: 0, prev: wk, nextWk: nxt };

      window.planner.mutateSharedWeek(wk, function (w) {
        w['cierreSaved_' + me.name] = true;
        var all3 = ['Víctor', 'Jaime', 'Colomba'].every(function (n) { return w['cierreSaved_' + n]; });
        if (all3) w.cierreSaved = true;
      });

      if (!nxt) return counts;

      var curW = window.planner.getSharedWeek(wk);

      // Carry de ACCIONES mas-tiempo
      var carries = (curW.acciones || []).filter(function (a) { return a.cierreState === 'mas-tiempo'; });
      if (carries.length) {
        window.planner.mutateSharedWeek(nxt, function (nw) {
          if (!nw.acciones) nw.acciones = [];
          carries.forEach(function (a) {
            var dup = nw.acciones.find(function (x) { return x.text === a.text && x.hitoId === a.hitoId; });
            if (dup) { counts.skipped++; return; }
            nw.acciones.push({
              id: nextAccionId(),
              text: a.text,
              owner: a.owner || 'Víctor',
              objId: a.objId || '',
              hitoId: a.hitoId,
              done: false,
              week: nxt,
              cierreState: 'mas-tiempo',
              carried: true,
              comment: ''
            });
            counts.carried++;
          });
        });
      }

      // Carry de ADMIN mas-tiempo
      var adminCarries = (curW.admin || []).filter(function (a) { return a.cierreState === 'mas-tiempo'; });
      if (adminCarries.length) {
        window.planner.mutateSharedWeek(nxt, function (nw) {
          if (!nw.admin) nw.admin = [];
          adminCarries.forEach(function (a) {
            var dup = nw.admin.find(function (x) { return x.text === a.text; });
            if (dup) { counts.skippedAdmin++; return; }
            nw.admin.push({
              id: nextAccionId(),
              text: a.text,
              owner: a.owner || 'Víctor',
              done: false,
              cierreState: 'mas-tiempo',
              carried: true
            });
            counts.carriedAdmin++;
          });
        });
      }

      // Cal items NO se cargan: están atados a eventos del calendario en esa fecha.
      return counts;
    }

    // ----- Render: row en modo Cierre -------------------------------
    function cierreAccionRowHtml(a, editable) {
      var p = (a.owner || '').trim();
      var letter = (p[0] || '?').toUpperCase();
      var col = PERSONA_COLORS[p] || '#888';
      var st = a.cierreState || '';

      var h = '<div class="sem-cierre-row">';
      h += '<div class="sem-accion-row" style="margin:0;">';
      h += '<span class="sem-accion-chip" style="background:' + col + '">' + escapeHtml(letter) + '</span>';
      h += '<div class="sem-accion-text">' + escapeHtml(a.text || '') + '</div>';
      if (a.carried) h += '<span class="sem-accion-pill sem-pill-carry">CARRY</span>';
      if (editable) {
        h += '<span class="sem-cierre-actions">';
        h += '<button class="sem-cierre-btn hecha' + (st === 'hecha' ? ' active' : '') + '" data-sem-action="cierre-state" data-state="hecha" data-idx="' + a._idx + '" title="Hecha">✓</button>';
        h += '<button class="sem-cierre-btn mas' + (st === 'mas-tiempo' ? ' active' : '') + '" data-sem-action="cierre-state" data-state="mas-tiempo" data-idx="' + a._idx + '" title="Más tiempo">⌛</button>';
        h += '<button class="sem-cierre-btn cancel' + (st === 'cancelada' ? ' active' : '') + '" data-sem-action="cierre-state" data-state="cancelada" data-idx="' + a._idx + '" title="Cancelada">✕</button>';
        h += '</span>';
      } else {
        if (st === 'hecha')        h += '<span class="sem-accion-pill sem-pill-hecha">HECHA</span>';
        else if (st === 'mas-tiempo') h += '<span class="sem-accion-pill sem-pill-mas">MÁS T.</span>';
        else if (st === 'cancelada')  h += '<span class="sem-accion-pill sem-pill-cancel">CANCEL.</span>';
      }
      h += '</div>';
      if (editable) {
        h += '<textarea class="sem-cierre-comment" rows="1" placeholder="Comentario del cierre (opcional)" data-sem-action="cierre-comment" data-idx="' + a._idx + '">' + escapeHtml(a.comment || '') + '</textarea>';
      } else if (a.comment) {
        h += '<div class="sem-accion-comment" style="margin-left:30px;">↳ ' + escapeHtml(a.comment) + '</div>';
      }
      h += '</div>';
      return h;
    }

    // ----- Render: Cierre mode (lista de acciones con marcadores) ---
    function renderCierreMode(editable) {
      var acciones = getAccionesForView();
      var objs = (window.planner.getShared().objs || []);

      if (!acciones.length) {
        return '<div class="sem-empty"><div class="sem-empty-big">Sin acciones</div><p>No hay nada que cerrar en ' + escapeHtml(weekKeyLabel(semSt.weekKey)) + '. Volvé al Plan para cargar acciones.</p></div>';
      }

      // Group by hito
      var byHito = {};
      acciones.forEach(function (a) {
        var hid = a.hitoId || '_orphan';
        if (!byHito[hid]) byHito[hid] = [];
        byHito[hid].push(a);
      });

      // Counters: cuántas marcadas
      var marked = 0;
      acciones.forEach(function (a) {
        if (a.cierreState === 'hecha' || a.cierreState === 'mas-tiempo' || a.cierreState === 'cancelada') marked++;
      });

      var h = '';
      h += '<div class="sem-stats">';
      h += '<span><b>' + marked + '</b> de <b>' + acciones.length + '</b> marcadas</span>';
      h += '</div>';

      // Foco grouping (igual que Plan)
      var orphans = [];
      var focoIdx = 0;
      objs.forEach(function (foco) {
        focoIdx++;
        var focoTag  = focoTagLabel(foco);
        var focoCol  = focoHeaderColor(focoIdx, foco);
        var focoBody = '';

        (foco.objetivos || foco.hitos ? (foco.objetivos || [{ hitos: foco.hitos, color: '#888', text: '' }]) : []).forEach(function (ob) {
          var oc = ob.color || '#888';
          var objBlock = '';
          (ob.hitos || []).forEach(function (hi) {
            var arr = byHito[hi.id];
            if (!arr || !arr.length) return;
            objBlock += '<div class="sem-hito-block">';
            objBlock += '<div class="sem-hito-label">' + escapeHtml(hi.text || '');
            if (hi.due) objBlock += '<span class="sem-hito-due">' + escapeHtml(hi.due) + '</span>';
            objBlock += '</div>';
            arr.forEach(function (a) { objBlock += cierreAccionRowHtml(a, editable); a._rendered = true; });
            objBlock += '</div>';
          });
          if (objBlock) {
            focoBody += '<div class="sem-obj-block">';
            if (ob.text) {
              focoBody += '<div class="sem-obj-label"><span class="sem-obj-dot" style="background:' + oc + '"></span>' + escapeHtml(ob.text) + '</div>';
            }
            focoBody += objBlock;
            focoBody += '</div>';
          }
        });

        if (focoBody) {
          h += '<div class="sem-foco-card">';
          h += '<div class="sem-foco-hdr">';
          h += '<span class="sem-foco-tag" style="background:' + focoCol + '">' + escapeHtml(focoTag) + '</span>';
          h += '<span class="sem-foco-title">' + escapeHtml(focoTitleClean(foco.text)) + '</span>';
          h += '</div>';
          h += '<div class="sem-foco-body">' + focoBody + '</div>';
          h += '</div>';
        }
      });

      acciones.forEach(function (a) { if (!a._rendered) orphans.push(a); });
      if (orphans.length) {
        h += '<div class="sem-foco-card">';
        h += '<div class="sem-foco-hdr"><span class="sem-foco-tag" style="background:#888">?</span><span class="sem-foco-title">Sin foco asociado</span></div>';
        h += '<div class="sem-foco-body">';
        orphans.forEach(function (a) { h += cierreAccionRowHtml(a, editable); });
        h += '</div></div>';
      }
      return h;
    }

    // ----- Output: helpers + render ----------------------------------
    var STATE_INFO = {
      'hecha':      { label: '✅ Hecha',      color: '#1a9e50' },
      'mas-tiempo': { label: '⏳ Más tiempo', color: '#b08000' },
      'cancelada':  { label: '❌ Cancelada',  color: '#c0392b' },
      'pendiente':  { label: '· Pendiente',   color: '#8e97b0' }
    };

    function hitoLookup() {
      // Devuelve un map { hitoId: { focoText, hitoText, focoIdx, oc } } para enriquecer items
      var objs = (window.planner.getShared().objs) || [];
      var map = {};
      var idx = 0;
      objs.forEach(function (foco) {
        idx++;
        var subs = foco.objetivos || (foco.hitos ? [{ hitos: foco.hitos, color: '#888', text: '' }] : []);
        subs.forEach(function (ob) {
          (ob.hitos || []).forEach(function (hi) {
            map[hi.id] = { focoText: foco.text || '', hitoText: hi.text || '', focoIdx: idx, focoId: foco.id, focoTag: focoTagLabel(foco), focoTitle: focoTitleClean(foco.text) };
          });
        });
      });
      return map;
    }

    function buildOutputData(persona, viewWk) {
      var prevK = prevWeekKey(viewWk);
      var prevW = window.planner.getSharedWeek(prevK) || {};
      var curW  = window.planner.getSharedWeek(viewWk) || {};
      var hmap = hitoLookup();

      function filterOwner(a) { return persona === 'all' || a.owner === persona; }
      function enrich(a) {
        var info = a.hitoId ? hmap[a.hitoId] : null;
        return {
          text: a.text || '', owner: a.owner || '', comment: a.comment || '',
          cierreState: a.cierreState || '', carried: !!a.carried,
          focoText: info ? info.focoText : '', hitoText: info ? info.hitoText : '',
          focoTag: info ? info.focoTag : '', focoTitle: info ? info.focoTitle : '', focoId: info ? info.focoId : ''
        };
      }

      // Cierre (semana anterior)
      var cierreAcciones = (prevW.acciones || []).filter(filterOwner).map(enrich);
      var cierreAdmin    = (prevW.admin    || []).filter(filterOwner).map(enrich);
      var cierreCal      = (prevW.cal      || []).filter(filterOwner).map(enrich);
      var cierreItems = cierreAcciones.concat(cierreAdmin, cierreCal);
      var cierreCounts = { hecha:0, 'mas-tiempo':0, cancelada:0, pendiente:0 };
      cierreItems.forEach(function (a) {
        var k = a.cierreState || 'pendiente';
        cierreCounts[k] = (cierreCounts[k] || 0) + 1;
      });
      var cierreTotal = cierreItems.length;
      var cierrePct = cierreTotal ? Math.round(cierreCounts.hecha / cierreTotal * 100) : 0;

      // Plan (semana actual)
      var planAcciones = (curW.acciones || []).filter(filterOwner).map(enrich);
      var planAdmin    = (curW.admin    || []).filter(filterOwner).map(enrich);
      var planCal      = (curW.cal      || []).filter(filterOwner).map(enrich);

      // Estados de guardado
      var savedFlags = ['Víctor', 'Jaime', 'Colomba'].filter(function (n) { return prevW['cierreSaved_' + n]; });

      return {
        prevK: prevK, curK: viewWk,
        prevSavedNames: savedFlags,
        prevSavedAll: !!prevW.cierreSaved,
        notesCierre: prevW.cierreNotes || '',
        notesPlan: curW.notes || '',
        cierre: {
          acciones: cierreAcciones, admin: cierreAdmin, cal: cierreCal,
          counts: cierreCounts, total: cierreTotal, pct: cierrePct
        },
        plan: {
          acciones: planAcciones, admin: planAdmin, cal: planCal
        }
      };
    }

    function buildOutputMarkdown(persona, viewWk) {
      var d = buildOutputData(persona, viewWk);
      var personaLabel = persona === 'all' ? 'Full Team' : persona;
      var lines = [];
      lines.push('# Resumen Semanal · ' + personaLabel);
      lines.push('Plan ' + weekKeyLabel(d.curK) + ' · Cierre ' + weekKeyLabel(d.prevK));
      lines.push('');

      // Section 1 — Cierre
      lines.push('## 1 · Cierre ' + weekKeyLabel(d.prevK));
      if (d.cierre.total) {
        lines.push('**Cumplimiento: ' + d.cierre.pct + '% (' + d.cierre.counts.hecha + ' de ' + d.cierre.total + ')**');
        lines.push('');
        ['hecha','mas-tiempo','cancelada','pendiente'].forEach(function (st) {
          var bucket = d.cierre.acciones.filter(function (a) { return (a.cierreState || 'pendiente') === st; });
          if (!bucket.length) return;
          lines.push('### ' + STATE_INFO[st].label + ' (' + bucket.length + ')');
          bucket.forEach(function (a) {
            var line = '- ' + a.text;
            if (a.hitoText) line += ' · _' + a.hitoText + '_';
            if (a.comment) line += ' — 💬 ' + a.comment;
            lines.push(line);
          });
          lines.push('');
        });
        if (d.cierre.admin.length) {
          lines.push('### 📋 Admin');
          d.cierre.admin.forEach(function (a) {
            var st = STATE_INFO[a.cierreState || 'pendiente'].label;
            var line = '- ' + a.text + ' · ' + st;
            if (a.comment) line += ' — 💬 ' + a.comment;
            lines.push(line);
          });
          lines.push('');
        }
        if (d.cierre.cal.length) {
          lines.push('### 📅 Calendario');
          d.cierre.cal.forEach(function (a) {
            var st = STATE_INFO[a.cierreState || 'pendiente'].label;
            var line = '- ' + a.text + ' · ' + st;
            if (a.comment) line += ' — 💬 ' + a.comment;
            lines.push(line);
          });
          lines.push('');
        }
        if (d.notesCierre) {
          lines.push('### Notas');
          lines.push(d.notesCierre);
          lines.push('');
        }
      } else {
        lines.push('_(sin items para ' + personaLabel + ' en ' + weekKeyLabel(d.prevK) + ')_');
        lines.push('');
      }

      // Section 2 — Plan
      lines.push('## 2 · Plan ' + weekKeyLabel(d.curK));
      if (d.plan.acciones.length) {
        // Agrupar por foco
        var byFoco = {};
        d.plan.acciones.forEach(function (a) {
          var k = a.focoId || '_orphan';
          if (!byFoco[k]) byFoco[k] = { focoText: a.focoText || 'Sin foco', items: [] };
          byFoco[k].items.push(a);
        });
        Object.keys(byFoco).forEach(function (k) {
          var grp = byFoco[k];
          lines.push('### 🎯 ' + grp.focoText);
          // Sub-agrupar por hito
          var byHito = {};
          grp.items.forEach(function (a) {
            var hk = a.hitoText || '_';
            if (!byHito[hk]) byHito[hk] = [];
            byHito[hk].push(a);
          });
          Object.keys(byHito).forEach(function (hk) {
            if (hk !== '_') lines.push('  - 🏁 ' + hk);
            byHito[hk].forEach(function (a) {
              var prefix = hk === '_' ? '  - ' : '    - ';
              var owner = a.owner ? ' [' + a.owner + ']' : '';
              var carry = a.carried ? ' ↻' : '';
              lines.push(prefix + a.text + owner + carry);
            });
          });
          lines.push('');
        });
      } else {
        lines.push('_(sin acciones planeadas)_');
        lines.push('');
      }
      if (d.plan.admin.length) {
        lines.push('### 📋 Admin');
        d.plan.admin.forEach(function (a) {
          var owner = a.owner ? ' [' + a.owner + ']' : '';
          lines.push('- ' + a.text + owner);
        });
        lines.push('');
      }
      if (d.plan.cal.length) {
        lines.push('### 📅 Calendario');
        d.plan.cal.forEach(function (a) {
          var owner = a.owner ? ' [' + a.owner + ']' : '';
          lines.push('- ' + a.text + owner);
        });
        lines.push('');
      }
      if (d.notesPlan) {
        lines.push('### Notas del plan');
        lines.push(d.notesPlan);
      }

      return lines.join('\n');
    }

    function copyToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }
      // Fallback
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
      return Promise.resolve();
    }
