    // ----- Historial: lista cronológica de semanas -------------------
    function buildHistoryRow(wk, w, persona, todayKey) {
      function ownerOk(x) { return persona === 'all' || x.owner === persona; }
      var accs = (w.acciones || []).filter(ownerOk);
      var admin = (w.admin    || []).filter(ownerOk);
      var cal   = (w.cal      || []).filter(ownerOk);
      var all = accs.concat(admin, cal);
      var counts = { hecha: 0, 'mas-tiempo': 0, cancelada: 0, pendiente: 0 };
      all.forEach(function (a) {
        var k = a.cierreState || 'pendiente';
        counts[k] = (counts[k] || 0) + 1;
      });
      var total = all.length;
      var pct = total ? Math.round(counts.hecha / total * 100) : 0;
      var savedNames = ['Víctor', 'Jaime', 'Colomba'].filter(function (n) { return w['cierreSaved_' + n]; });
      var saved = savedNames.length;

      var p = parseKey(wk);
      var t = parseKey(todayKey);
      var isCurrent = (wk === todayKey);
      var isFuture = p && t && (p.year > t.year || (p.year === t.year && p.week > t.week));

      var badge = '';
      if (saved === 3)      badge = '<span class="sem-hist-wk-badge" style="background:rgba(26,158,80,0.12);color:#1a7a3e;">✓ Cierre completo</span>';
      else if (saved > 0)   badge = '<span class="sem-hist-wk-badge" style="background:rgba(176,128,0,0.12);color:#8a6500;">◔ ' + saved + '/3 cerrado</span>';
      else if (total)       badge = '<span class="sem-hist-wk-badge" style="background:rgba(0,0,0,0.05);color:var(--muted);">sin cerrar</span>';
      else                  badge = '<span class="sem-hist-wk-badge" style="background:rgba(0,0,0,0.04);color:var(--muted);font-style:italic;">vacía</span>';

      var rowCls = 'sem-hist-row' + (isCurrent ? ' current' : '') + (isFuture ? ' future' : '');
      var h = '<div class="' + rowCls + '">';
      h += '<div>';
      h += '<div class="sem-hist-wk-label">' + escapeHtml(weekKeyLabel(wk)) + (isCurrent ? ' · hoy' : '') + '</div>';
      h += '<div class="sem-hist-wk-dates">' + escapeHtml(weekKeyToDates(wk)) + '</div>';
      h += badge;
      h += '</div>';
      h += '<div class="sem-hist-stats">';
      if (total) {
        h += '<span class="sem-hist-pct">' + pct + '%</span>';
        h += '<span><b>' + total + '</b> total</span>';
        if (counts.hecha)       h += '<span style="color:#1a7a3e;">✓ <b>' + counts.hecha + '</b></span>';
        if (counts['mas-tiempo']) h += '<span style="color:#8a6500;">⏳ <b>' + counts['mas-tiempo'] + '</b></span>';
        if (counts.cancelada)   h += '<span style="color:#a83227;">✕ <b>' + counts.cancelada + '</b></span>';
        if (counts.pendiente)   h += '<span style="color:var(--muted);">· <b>' + counts.pendiente + '</b></span>';
      } else {
        h += '<span style="color:var(--muted);font-style:italic;">— sin items —</span>';
      }
      h += '</div>';
      h += '<div class="sem-hist-actions">';
      h += '<button class="sem-hist-jump" data-sem-action="jump-week" data-wk="' + escapeHtml(wk) + '" data-tomode="plan">📋 Plan</button>';
      h += '<button class="sem-hist-jump" data-sem-action="jump-week" data-wk="' + escapeHtml(wk) + '" data-tomode="cierre">✓ Cierre</button>';
      h += '<button class="sem-hist-jump" data-sem-action="jump-week" data-wk="' + escapeHtml(wk) + '" data-tomode="output">📄 Output</button>';
      h += '</div>';
      h += '</div>';
      return h;
    }

    function renderHistoryMode(persona) {
      var sharedWeeks = (window.planner.getShared().weeks) || {};
      var keys = Object.keys(sharedWeeks).filter(function (k) { return parseKey(k); });

      var iso = getISOWeek(new Date());
      var todayKey = weekToKey(iso.year, iso.week);

      if (!keys.length) {
        return '<div class="sem-empty"><div class="sem-empty-big">Sin historial</div><p>El historial se va a ir llenando a medida que se planeen y cierren semanas.</p></div>';
      }

      // Ordenar descendiente (más reciente primero)
      keys.sort();
      keys.reverse();

      var personaLabel = persona === 'all' ? 'todos' : persona;
      var h = '<div class="sem-hist-toolbar">';
      h += '<span style="font-family:DM Mono,monospace;font-size:11px;color:var(--muted);"><b>' + keys.length + '</b> semanas registradas · filtro: ' + escapeHtml(personaLabel) + '</span>';
      h += '</div>';

      h += '<div class="sem-history-list">';
      keys.forEach(function (wk) {
        h += buildHistoryRow(wk, sharedWeeks[wk], persona, todayKey);
      });
      h += '</div>';
      return h;
    }

    // ----- Render principal -------------------------------------------
    function render() {
      var root = document.getElementById('semanal-root');
      if (!root) return;
      var me = window.planner.getMe();
      if (!me) return;

      if (!semSt.weekKey) semSt.weekKey = pickInitialWeek();
      if (!semSt.persona) semSt.persona = 'all';

      var myW = myWeekState();
      var cierreSavedMine = !!(myW && myW['cierreSaved_' + me.name]);
      var planSaved   = !!(myW && myW.planSaved);
      var teamCount   = teamCierreCount();
      var editable    = canEdit();
      var prevK       = prevWeekKey(semSt.weekKey);

      var h = '<div class="sem-header">';
      h += '<div class="sem-week-nav">';
      h += '<button class="sem-week-btn" id="semPrev" title="semana anterior">←</button>';
      h += '<div class="sem-week-info">';
      h += '<div class="sem-week-label">' + escapeHtml(weekKeyLabel(semSt.weekKey));
      if (cierreSavedMine) h += '<span class="sem-week-active-dot" title="tu cierre guardado"></span>';
      else if (planSaved) h += '<span class="sem-week-cierre-dot" title="plan guardado"></span>';
      h += '</div>';
      h += '<div class="sem-week-dates">' + escapeHtml(weekKeyToDates(semSt.weekKey)) + ' · cierre equipo ' + teamCount + '/3</div>';
      h += '</div>';
      h += '<button class="sem-week-btn" id="semNext" title="semana siguiente">→</button>';
      h += '</div>';

      h += '<div class="sem-persona-tabs">';
      PERSONAS.forEach(function (p) {
        var col = PERSONA_COLORS[p] || '#444';
        var dot = (p !== 'all') ? '<span class="sem-persona-dot" style="background:' + col + '"></span>' : '';
        h += '<button class="sem-persona-btn' + (semSt.persona === p ? ' active' : '') + '" data-sem-persona="' + p + '">' + dot + PERSONA_LABELS[p] + '</button>';
      });
      h += '</div>';

      h += '<div class="sem-mode-tabs">';
      MODES.forEach(function (m) {
        h += '<button class="sem-mode-btn' + (semSt.mode === m.id ? ' active' : '') + '" data-sem-mode="' + m.id + '"' + (m.enabled ? '' : ' disabled') + '>' + m.label + '</button>';
      });
      h += '</div>';
      h += '</div>'; // end .sem-header

      // Banner contextual
      if (semSt.persona === 'all') {
        h += '<div class="sem-banner sem-banner-info">Vista Equipo · merge de los 3. Lo que crees acá queda asignado a vos por default — podés cambiarle el dueño.</div>';
      } else if (semSt.persona !== me.name) {
        h += '<div class="sem-banner sem-banner-warn">Viendo a ' + escapeHtml(semSt.persona) + ' — solo lectura.</div>';
      } else {
        h += '<div class="sem-banner sem-banner-muted">Tu vista — podés editar.</div>';
      }

      // Body
      if (semSt.mode === 'plan') {
        h += '<div class="sem-plan-grid">';
        h += '<div class="sem-plan-main">';
        // Toolbar edición
        if (editable) {
          h += '<div class="sem-toolbar">';
          h += '<button class="sem-btn-primary" data-sem-action="open-add">+ Nueva acción</button>';
          var prevExists = prevK && window.planner.getSharedWeek(prevK);
          h += '<button class="sem-btn-ghost" data-sem-action="carry-prev"' +
               (prevExists ? '' : ' disabled') + '>↻ Traer pendientes de ' + escapeHtml(weekKeyLabel(prevK || '—')) + '</button>';
          h += '</div>';
          if (semSt.adding) h += renderAddForm();
        }
        h += renderPlanMode(editable);
        h += '</div>'; // .sem-plan-main
        h += '<aside class="sem-plan-side">';
        h += renderAdminBlock(editable, 'plan');
        h += renderCalBlock(editable);
        h += renderNotasBlock(editable, 'plan');
        h += '</aside>';
        h += '</div>'; // .sem-plan-grid
      } else if (semSt.mode === 'cierre') {
        var savedMine = !!(myW && myW['cierreSaved_' + me.name]);
        var nxtK = nextWeekKey(semSt.weekKey);
        h += '<div class="sem-plan-grid">';
        h += '<div class="sem-plan-main">';
        if (editable) {
          h += '<div class="sem-cierre-toolbar">';
          h += '<button class="sem-btn-primary" data-sem-action="save-cierre">' + (savedMine ? '↻ Re-guardar cierre' : '✓ Guardar cierre') + '</button>';
          if (savedMine) {
            h += '<span class="sem-cierre-progress">tu cierre <b>guardado</b> · cierre equipo <b>' + teamCount + '/3</b> · próx. ' + escapeHtml(weekKeyLabel(nxtK || '—')) + '</span>';
          } else {
            h += '<span class="sem-cierre-progress">al guardar, las "más tiempo" saltan a <b>' + escapeHtml(weekKeyLabel(nxtK || '—')) + '</b></span>';
          }
          h += '</div>';
        }
        if (semSt.cierreFeedback) {
          h += '<div class="sem-cierre-feedback">' + escapeHtml(semSt.cierreFeedback) + '</div>';
        }
        h += renderCierreMode(editable);
        h += '</div>'; // main
        h += '<aside class="sem-plan-side">';
        h += renderAdminBlock(editable, 'cierre');
        h += renderCalBlockCierre(editable);
        h += renderNotasBlock(editable, 'cierre');
        h += '</aside>';
        h += '</div>';
      } else if (semSt.mode === 'output') {
        h += renderOutputMode(semSt.persona);
      } else if (semSt.mode === 'history') {
        h += renderHistoryMode(semSt.persona);
      } else {
        h += '<div class="sem-empty"><div class="sem-empty-big">Próximamente</div><p>Modo <code>' + semSt.mode + '</code> llega en la siguiente ronda.</p></div>';
      }

      root.innerHTML = h;

      // ---- Bind handlers ----
      var prev = document.getElementById('semPrev');
      var next = document.getElementById('semNext');
      if (prev) prev.addEventListener('click', function () { shiftWeek(-1); });
      if (next) next.addEventListener('click', function () { shiftWeek(1); });
      root.querySelectorAll('[data-sem-persona]').forEach(function (b) {
        b.addEventListener('click', function () {
          semSt.persona = b.getAttribute('data-sem-persona');
          semSt.adding = false; semSt.editing = null;
          render();
        });
      });
      root.querySelectorAll('[data-sem-mode]').forEach(function (b) {
        b.addEventListener('click', function () {
          if (b.disabled) return;
          semSt.mode = b.getAttribute('data-sem-mode');
          semSt.adding = false; semSt.editing = null;
          render();
        });
      });

      // Botones del form/toolbar/rows
      root.querySelectorAll('[data-sem-action]').forEach(function (b) {
        b.addEventListener('click', function (ev) {
          var action = b.getAttribute('data-sem-action');
          if (action === 'open-add') {
            semSt.adding = true;
            semSt.addDraft = null;
            semSt.editing = null;
            render();
            setTimeout(function () { var t = document.getElementById('semAddText'); if (t) t.focus(); }, 30);
          } else if (action === 'cancel-add') {
            semSt.adding = false; semSt.addDraft = null; render();
          } else if (action === 'confirm-add') {
            var txtEl  = document.getElementById('semAddText');
            var selEl  = document.getElementById('semAddHito');
            var ownerBtn = root.querySelector('.sem-owner-btn.active');
            var text  = (txtEl && txtEl.value || '').trim();
            var hitoId = selEl ? selEl.value : '';
            var owner = ownerBtn ? ownerBtn.getAttribute('data-sem-owner') : me.name;
            if (!text)  { alert('Escribí el texto de la acción.'); return; }
            if (!hitoId) { alert('Elegí un hito asociado.'); return; }
            var opt = selEl.selectedOptions[0];
            var objId = opt ? opt.getAttribute('data-objid') : '';
            addAccion({ text: text, owner: owner, hitoId: hitoId, objId: objId });
            semSt.adding = false; semSt.addDraft = null;
            render();
          } else if (action === 'carry-prev') {
            var res = carryFromPrev();
            console.log('[carry] +' + res.added + ' agregadas · ' + res.skipped + ' saltadas (origen: ' + res.prev + ')');
            render();
          } else if (action === 'start-edit') {
            semSt.editing = parseInt(b.getAttribute('data-idx'), 10);
            semSt.adding = false;
            render();
            setTimeout(function () { var t = document.getElementById('semEditTxt'); if (t) { t.focus(); t.setSelectionRange(t.value.length, t.value.length); } }, 30);
          } else if (action === 'cancel-edit') {
            semSt.editing = null; render();
          } else if (action === 'save-edit') {
            var idx = parseInt(b.getAttribute('data-idx'), 10);
            var newTxt = (document.getElementById('semEditTxt') || {}).value || '';
            var newCmt = (document.getElementById('semEditCmt') || {}).value || '';
            newTxt = newTxt.trim(); newCmt = newCmt.trim();
            if (!newTxt) { alert('El texto no puede estar vacío.'); return; }
            updateAccion(idx, { text: newTxt, comment: newCmt });
            semSt.editing = null; render();
          } else if (action === 'delete') {
            var di = parseInt(b.getAttribute('data-idx'), 10);
            var acc = (myWeekState() || { acciones: [] }).acciones[di];
            var snippet = acc ? (acc.text || '').slice(0, 60) : '';
            if (confirm('¿Eliminar esta acción?\n\n"' + snippet + '"')) {
              deleteAccion(di);
              render();
            }
          } else if (action === 'add-admin') {
            var inp = document.getElementById('semAdminInput');
            var own = document.getElementById('semAdminOwner');
            var txt = (inp && inp.value || '').trim();
            if (!txt) return;
            addAdminItem(txt, own ? own.value : 'Víctor');
            render();
            setTimeout(function () { var i = document.getElementById('semAdminInput'); if (i) i.focus(); }, 30);
          } else if (action === 'del-admin') {
            deleteAdminItem(parseInt(b.getAttribute('data-idx'), 10));
            render();
          } else if (action === 'toggle-admin') {
            toggleAdminDone(parseInt(b.getAttribute('data-idx'), 10));
            render();
          } else if (action === 'cierre-state') {
            var idxCs = parseInt(b.getAttribute('data-idx'), 10);
            var newState = b.getAttribute('data-state');
            setCierreState(idxCs, newState);
            render();
          } else if (action === 'admin-cierre-state') {
            setAdminCierreState(parseInt(b.getAttribute('data-idx'), 10), b.getAttribute('data-state'));
            render();
          } else if (action === 'cal-cierre-state') {
            setCalCierreState(parseInt(b.getAttribute('data-idx'), 10), b.getAttribute('data-state'));
            render();
          } else if (action === 'jump-week') {
            semSt.weekKey = b.getAttribute('data-wk');
            semSt.mode = b.getAttribute('data-tomode');
            semSt.adding = false; semSt.editing = null; semSt.cierreFeedback = null;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
          } else if (action === 'copy-output-md') {
            var md = buildOutputMarkdown(semSt.persona, semSt.weekKey);
            copyToClipboard(md).then(function () {
              var fb = document.getElementById('semCopyFeedback');
              if (fb) {
                fb.textContent = '✓ Copiado al portapapeles';
                setTimeout(function () { if (fb.textContent === '✓ Copiado al portapapeles') fb.textContent = ''; }, 2500);
              }
            });
          } else if (action === 'save-cierre') {
            var res = saveCierre();
            var fb = '✓ Cierre guardado.';
            if (res.nextWk) {
              var parts = [];
              if (res.carried)      parts.push(res.carried + ' acción(es)');
              if (res.carriedAdmin) parts.push(res.carriedAdmin + ' admin');
              if (parts.length) fb += ' Carry-over a ' + weekKeyLabel(res.nextWk) + ': ' + parts.join(' + ');
              if (res.skipped || res.skippedAdmin) {
                fb += ' (' + (res.skipped + res.skippedAdmin) + ' ya estaban ahí)';
              }
              if (!parts.length) fb += ' Sin carry-over.';
              fb += '.';
            }
            semSt.cierreFeedback = fb;
            render();
            setTimeout(function () { semSt.cierreFeedback = null; render(); }, 4500);
          } else if (action === 'sync-cal') {
            var evK = b.getAttribute('data-evkey');
            var evT = b.getAttribute('data-evtext');
            var pK  = b.getAttribute('data-prepkey');
            var oK  = b.getAttribute('data-ownerkey');
            var prepArea = root.querySelector('[data-prepkey="' + pK + '"]');
            var prepTxt  = prepArea ? prepArea.value.trim() : '';
            var w = myWeekState() || {};
            var owner = (w.calPrep || {})[oK] || 'Víctor';
            // Si ya está sincronizado, des-sincronizar; si no, sincronizar
            var alreadySynced = (w.cal || []).some(function (c) { return c._evKey === evK; });
            if (alreadySynced) {
              syncCalItem(evK, '', owner); // text vacío → borra
            } else {
              syncCalItem(evK, prepTxt || evT, owner);
            }
            render();
          }
        });
      });

      // Calendar prep textareas — guardar al perder foco
      root.querySelectorAll('[data-sem-action="set-cal-prep"]').forEach(function (ta) {
        ta.addEventListener('change', function () {
          setCalPrep(ta.getAttribute('data-prepkey'), ta.value);
        });
      });
      // Calendar owner selects — guardar on change
      root.querySelectorAll('[data-sem-action="set-cal-owner"]').forEach(function (sel) {
        sel.addEventListener('change', function () {
          setCalOwner(sel.getAttribute('data-ownerkey'), sel.value);
          var evK = sel.getAttribute('data-evkey');
          // Si ya está sincronizado, propagar dueño nuevo al cal[]
          var w = myWeekState();
          if (w && w.cal) {
            var idx = w.cal.findIndex(function (c) { return c._evKey === evK; });
            if (idx >= 0) {
              window.planner.mutateSharedWeek(semSt.weekKey, function (ww) {
                if (ww.cal && ww.cal[idx]) ww.cal[idx].owner = sel.value;
              });
            }
          }
        });
      });
      // Admin input — Enter para agregar
      var adminInp = document.getElementById('semAdminInput');
      if (adminInp) {
        adminInp.addEventListener('keydown', function (ev) {
          if (ev.key === 'Enter') {
            ev.preventDefault();
            var btn = root.querySelector('[data-sem-action="add-admin"]');
            if (btn) btn.click();
          }
        });
      }
      // Notas (plan o cierre, según data-notes-field) — debounced save
      var notesEl = document.getElementById('semNotesArea');
      if (notesEl) {
        var notesField = notesEl.getAttribute('data-notes-field') || 'notes';
        var notesTimer = null;
        var commitNotes = function () {
          if (notesField === 'cierreNotes') setCierreNotes(notesEl.value);
          else setNotes(notesEl.value);
        };
        notesEl.addEventListener('input', function () {
          if (notesTimer) clearTimeout(notesTimer);
          notesTimer = setTimeout(commitNotes, 600);
        });
        notesEl.addEventListener('blur', function () {
          if (notesTimer) { clearTimeout(notesTimer); notesTimer = null; }
          commitNotes();
        });
      }

      // Cierre comments — debounced save por textarea
      root.querySelectorAll('[data-sem-action="cierre-comment"]').forEach(function (ta) {
        var t = null;
        var commit = function () { setAccionComment(parseInt(ta.getAttribute('data-idx'), 10), ta.value); };
        ta.addEventListener('input', function () {
          if (t) clearTimeout(t);
          t = setTimeout(commit, 500);
        });
        ta.addEventListener('blur', function () {
          if (t) { clearTimeout(t); t = null; }
          commit();
        });
      });

      // Owner picker en el form: marcar active al click
      root.querySelectorAll('.sem-owner-btn').forEach(function (b) {
        b.addEventListener('click', function (ev) {
          ev.preventDefault();
          root.querySelectorAll('.sem-owner-btn').forEach(function (x) { x.classList.remove('active'); });
          b.classList.add('active');
        });
      });
    }

    // ----- Boot -------------------------------------------------------
    window.renderSemanal = function () {
      try {
        render();
      } catch (e) {
        console.error('[semanal] render error:', e);
        var root = document.getElementById('semanal-root');
        if (root) root.innerHTML = '<div class="sem-empty"><div class="sem-empty-big">Error</div><p>' + escapeHtml(e.message || e) + '</p></div>';
      }
    };

  })();
  </script>

  <!-- =================================================================
       MÓDULO CEO UPDATE — notas privadas por hito
       Lee shared.objs para la estructura y planner_user.ceoNotes para
       los textos de cada usuario. Auto-save debounced 600ms.
       ================================================================= -->
  <script>
  (function () {
    'use strict';

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
      });
    }

    function focoHeaderColor(idx, foco) {
      if (foco && foco.tag === 'personal') return '#6b7280';
      var pal = ['#1B3A4B', '#2D5F3E', '#5C3D2E', '#3B2D5C', '#5C1A1A'];
      return pal[(idx - 1) % pal.length];
    }
    function focoTagLabel(foco) {
      if (foco && foco.tag === 'personal') return 'PERSONAL';
      var m = ((foco && foco.text) || '').match(/^(\d{2}|4\+1)/);
      return m ? m[0] : 'WORK';
    }
    function focoTitleClean(t) {
      return (t || '').replace(/^(\d{2}|4\+1)\s*·\s*/, '');
    }

    function getCeoNotes() {
      var u = window.planner.getMyUserState();
      return (u && u.ceoNotes) || {};
    }
    function setCeoNote(hitoId, text) {
      window.planner.mutateMyUser(function (u) {
        if (!u.ceoNotes) u.ceoNotes = {};
        if (text) u.ceoNotes[hitoId] = text;
        else delete u.ceoNotes[hitoId];
      });
    }

    function render() {
      var root = document.getElementById('ceo-root');
      if (!root) return;
      var me = window.planner.getMe();
      if (!me) return;
      var objs = (window.planner.getShared().objs) || [];
      var notes = getCeoNotes();

      var h = '<div class="ceo-banner">';
      h += '🤐 <span><b>Notas privadas</b> · Solo las ves vos (' + escapeHtml(me.name) + '). Útil para observaciones internas, dudas, riesgos, lo que sea — sin que J/C lo vean.</span>';
      h += '</div>';

      if (!objs.length) {
        h += '<div class="ceo-empty">El estado compartido no tiene focos cargados.</div>';
        root.innerHTML = h;
        return;
      }

      var focoIdx = 0;
      objs.forEach(function (foco) {
        focoIdx++;
        var focoTag  = focoTagLabel(foco);
        var focoCol  = focoHeaderColor(focoIdx, foco);
        var focoTitle = focoTitleClean(foco.text);

        h += '<div class="ceo-foco">';
        h += '<div class="ceo-foco-hdr">';
        h += '<span class="ceo-foco-tag" style="background:' + focoCol + '">' + escapeHtml(focoTag) + '</span>';
        h += '<span class="ceo-foco-title">' + escapeHtml(focoTitle) + '</span>';
        h += '</div>';
        h += '<div class="ceo-foco-body">';

        var subs = foco.objetivos || (foco.hitos ? [{ hitos: foco.hitos, color: '#888', text: '' }] : []);
        subs.forEach(function (ob) {
          var oc = ob.color || '#888';
          h += '<div class="ceo-obj">';
          if (ob.text) {
            h += '<div class="ceo-obj-label"><span class="ceo-obj-dot" style="background:' + oc + '"></span>' + escapeHtml(ob.text) + '</div>';
          }
          (ob.hitos || []).forEach(function (hi) {
            var noteText = notes[hi.id] || '';
            h += '<div class="ceo-hito">';
            h += '<div class="ceo-hito-hdr">';
            h += '<span class="ceo-hito-text">🏁 ' + escapeHtml(hi.text || '') + '</span>';
            if (hi.due)    h += '<span class="ceo-hito-due">' + escapeHtml(hi.due) + '</span>';
            if (hi.status) h += '<span class="ceo-hito-status">' + escapeHtml(hi.status) + '</span>';
            h += '<span class="ceo-savemark" data-mark="' + escapeHtml(hi.id) + '">✓ guardado</span>';
            h += '</div>';
            h += '<textarea class="ceo-textarea" data-hito="' + escapeHtml(hi.id) + '" placeholder="Notas privadas sobre este hito (riesgos, dudas, observaciones, lo que necesites recordar)...">' + escapeHtml(noteText) + '</textarea>';
            h += '</div>';
          });
          h += '</div>'; // ceo-obj
        });

        h += '</div></div>'; // body + foco
      });

      root.innerHTML = h;

      // Bindings: auto-save por textarea
      root.querySelectorAll('.ceo-textarea').forEach(function (ta) {
        var hid = ta.getAttribute('data-hito');
        var mark = root.querySelector('.ceo-savemark[data-mark="' + hid + '"]');
        var t = null;
        var commit = function () {
          setCeoNote(hid, ta.value);
          if (mark) {
            mark.classList.add('show');
            setTimeout(function () { mark.classList.remove('show'); }, 1500);
          }
        };
        ta.addEventListener('input', function () {
          if (t) clearTimeout(t);
          t = setTimeout(commit, 700);
        });
        ta.addEventListener('blur', function () {
          if (t) { clearTimeout(t); t = null; }
          commit();
        });
      });
    }

    window.renderCEO = function () {
      try {
        render();
      } catch (e) {
        console.error('[ceo] render error:', e);
        var root = document.getElementById('ceo-root');
        if (root) root.innerHTML = '<div class="ceo-empty">Error: ' + escapeHtml(e.message || e) + '</div>';
      }
    };
  })();
  </script>

</body>
</html>
